# PostgreSQL (AWS Aurora) — IAM auth via AWS Advanced JDBC Wrapper.
# Required when Internet Access Gateway is enabled (password auth from the internet is rejected).
#
# JDBC URL example:
# jdbc:aws-wrapper:postgresql://cluster-host:5432/postgres?sslmode=require
#
# Credentials: no DB password — the wrapper generates IAM tokens from the AWS credential chain
# (ECS task role, ~/.aws/credentials locally, CloudShell admin session, etc.).
# IAM user/role needs rds-db:connect on arn:aws:rds-db:REGION:ACCOUNT:dbuser:CLUSTER_RESOURCE_ID/postgres
spring.datasource.url=${SPRING_DATASOURCE_URL}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME}
spring.datasource.driver-class-name=software.amazon.jdbc.Driver

spring.datasource.hikari.data-source-properties.wrapperPlugins=iam
spring.datasource.hikari.data-source-properties.iamRegion=${AWS_REGION:eu-north-1}
spring.datasource.hikari.max-lifetime=1260000
spring.datasource.hikari.exception-override-class-name=software.amazon.jdbc.util.HikariCPSQLException

spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect

# Flyway runs migrations on startup against RDS
spring.flyway.enabled=true
spring.flyway.baseline-on-migrate=false

# Behind ALB / reverse proxy
server.forward-headers-strategy=framework
server.port=${PORT:8080}
server.shutdown=graceful

# Health checks for ECS / App Runner / ALB
management.endpoints.web.exposure.include=health,info
management.endpoint.health.probes.enabled=true
management.endpoint.health.show-details=never

# Disable dev tooling in production
spring.h2.console.enabled=false
springdoc.api-docs.enabled=false
springdoc.swagger-ui.enabled=false

# Logging
logging.level.root=INFO
logging.level.com.gurukul=INFO
logging.level.org.hibernate.SQL=WARN
